name: Feature request
description: Propose a scoped improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Permission, privacy, and safety impact
      description: Describe new data access, network calls, permissions, or emergency behavior.
    validations:
      required: true
