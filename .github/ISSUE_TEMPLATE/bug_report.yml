name: Bug report
description: Report a reproducible defect without personal or emergency data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not submit real phone numbers, messages, contacts, addresses, location history, recordings, credentials, or active emergencies. This project is not an emergency service.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use fictional and sanitized data only.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Commit, Android version, device model, and build type.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: Data-safety confirmation
      options:
        - label: I removed all personal, credential, message, contact, location, call, and emergency data.
          required: true
