AutoName: Contact
Summary: Emergency phone app that enhances everyday calling and texting
Description: |
  Contact enhances the calling and texting you already use every day with
  built-in emergency tools — silent text-to-911, live video dispatch,
  real-time location sharing, medical-profile relay, and automatic routing
  to 988, 311, and 211. No new workflows to learn.

  Works the way your phone already works: calls, texts, contacts, keypad,
  recent. Built with React Native, TypeScript, and native Kotlin modules.

  Not a certified emergency service. For experimental and educational use.

RepoType: git
