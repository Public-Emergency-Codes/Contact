Builds:
  - versionName: '1.0.0'
    versionCode: 1
    commit: v1.0.0
    subdir: android
    sudo:
      - apt-get update
      - apt-get install -y openjdk-17-jdk-headless
    init:
      - cd .. && npm ci
    gradle:
      - yes
    prebuild:
      - cd .. && npx expo prebuild --platform android

